<div class="content-wrapper">
  <div class="profile-header">
    <div class="profile-avatar">{{account?.firstName?.charAt(0)}}{{account?.lastName?.charAt(0)}}</div>
    <div class="profile-info">
      <h2>{{account?.title}} {{account?.firstName}} {{account?.lastName}}</h2>
      <p>{{account?.email}}</p>
    </div>
  </div>
  <div class="glass-card">
    <div class="glass-card-body">
      <div class="detail-row">
        <span class="detail-label">Full Name</span>
        <span class="detail-value">{{account?.title}} {{account?.firstName}} {{account?.lastName}}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Email</span>
        <span class="detail-value">{{account?.email}}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Role</span>
        <span class="detail-value">{{account?.role}}</span>
      </div>
    </div>
  </div>
  <div style="margin-top:1.5rem">
    <a routerLink="/profile/update" class="btn-premium btn-primary-premium">Edit Profile</a>
  </div>
</div>
