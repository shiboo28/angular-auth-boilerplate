<div class="content-wrapper">
  <h2 style="font-size:1.5rem;font-weight:700;letter-spacing:-0.02em;margin-bottom:1.5rem">Update Profile</h2>
  <div class="glass-card">
    <div class="glass-card-body">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-row">
          <div class="form-group">
            <label>First name</label>
            <input type="text" formControlName="firstName" class="form-input" [class.is-invalid]="submitted && f['firstName'].errors" />
            <div *ngIf="submitted && f['firstName'].errors" class="invalid-feedback" style="display:block">Required</div>
          </div>
          <div class="form-group">
            <label>Last name</label>
            <input type="text" formControlName="lastName" class="form-input" [class.is-invalid]="submitted && f['lastName'].errors" />
            <div *ngIf="submitted && f['lastName'].errors" class="invalid-feedback" style="display:block">Required</div>
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" formControlName="email" class="form-input" [class.is-invalid]="submitted && f['email'].errors" />
          <div *ngIf="submitted && f['email'].errors" class="invalid-feedback" style="display:block">
            <div *ngIf="f['email'].errors['required']">Required</div>
            <div *ngIf="f['email'].errors['email']">Invalid email</div>
          </div>
        </div>
        <p style="font-size:0.8125rem;color:var(--text-muted);margin-bottom:1rem">Leave password blank to keep unchanged</p>
        <div class="form-row">
          <div class="form-group">
            <label>Password</label>
            <input type="password" formControlName="password" class="form-input" placeholder="New password" />
          </div>
          <div class="form-group">
            <label>Confirm password</label>
            <input type="password" formControlName="confirmPassword" class="form-input" [class.is-invalid]="submitted && f['confirmPassword'].errors" placeholder="Confirm" />
            <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback" style="display:block">
              <div *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords must match</div>
            </div>
          </div>
        </div>
        <div style="display:flex;gap:0.75rem;align-items:center">
          <button [disabled]="loading" class="btn-premium btn-primary-premium">
            <span *ngIf="loading" class="spinner"></span>
            {{ loading ? 'Saving...' : 'Save changes' }}
          </button>
          <a routerLink="/profile" class="btn-premium btn-ghost">Cancel</a>
          <button type="button" (click)="onDelete()" class="btn-premium btn-danger-premium" style="margin-left:auto">Delete Account</button>
        </div>
      </form>
    </div>
  </div>
</div>
