<div class="home-container">
  <h1 class="home-greeting">Hi, <span>{{account?.firstName}}</span> 👋</h1>
  <p class="home-subtitle">Welcome to your dashboard. You're logged in with Angular 21 & JWT.</p>
  <div class="home-role-badge">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    {{account?.role}}
  </div>
  <div class="home-stats">
    <div class="stat-card">
      <div class="stat-label">Account Status</div>
      <div class="stat-value" style="color:var(--success)">Active</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Role</div>
      <div class="stat-value">{{account?.role}}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Email</div>
      <div class="stat-value" style="font-size:1rem">{{account?.email}}</div>
    </div>
  </div>
</div>
