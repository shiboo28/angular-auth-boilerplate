<h2 style="font-size:1.5rem;font-weight:700;letter-spacing:-0.02em;margin-bottom:1.5rem">{{isAddMode ? 'Add Account' : 'Edit Account'}}</h2>
<div class="glass-card">
  <div class="glass-card-body">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label>First name</label>
          <input type="text" formControlName="firstName" class="form-input" [class.is-invalid]="submitted && f['firstName'].errors" />
          <div *ngIf="submitted && f['firstName'].errors" class="invalid-feedback" style="display:block">Required</div>
        </div>
        <div class="form-group">
          <label>Last name</label>
          <input type="text" formControlName="lastName" class="form-input" [class.is-invalid]="submitted && f['lastName'].errors" />
          <div *ngIf="submitted && f['lastName'].errors" class="invalid-feedback" style="display:block">Required</div>
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" class="form-input" [class.is-invalid]="submitted && f['email'].errors" />
        <div *ngIf="submitted && f['email'].errors" class="invalid-feedback" style="display:block">Valid email is required</div>
      </div>
      <div class="form-group">
        <label>Password <span *ngIf="!isAddMode" style="color:var(--text-muted);font-weight:400">(leave blank to keep current)</span></label>
        <input type="password" formControlName="password" class="form-input" [class.is-invalid]="submitted && f['password'].errors" placeholder="Min 6 characters" />
        <div *ngIf="submitted && f['password'].errors" class="invalid-feedback" style="display:block">
          <div *ngIf="f['password'].errors['required']">Password is required</div>
          <div *ngIf="f['password'].errors['minlength']">Min 6 characters</div>
        </div>
      </div>
      <div style="display:flex;gap:0.75rem">
        <button [disabled]="loading" class="btn-premium btn-primary-premium">
          <span *ngIf="loading" class="spinner"></span>
          {{ loading ? 'Saving...' : 'Save' }}
        </button>
        <a routerLink="/admin/accounts" class="btn-premium btn-ghost">Cancel</a>
      </div>
      <div *ngIf="error" class="alert-premium alert-danger" style="margin-top:1rem">{{error}}</div>
    </form>
  </div>
</div>
