<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
  <h2 style="font-size:1.5rem;font-weight:700;letter-spacing:-0.02em;margin:0">Accounts</h2>
  <a routerLink="add" class="btn-premium btn-primary-premium" style="font-size:0.8125rem;padding:0.5rem 1rem">+ Add Account</a>
</div>
<div class="glass-card">
  <div class="glass-card-body" style="padding:0;overflow-x:auto">
    <table class="table-premium">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
          <th style="text-align:right">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let account of accounts">
          <td style="font-weight:500">{{account.firstName}} {{account.lastName}}</td>
          <td>{{account.email}}</td>
          <td>
            <span class="home-role-badge" style="font-size:0.75rem;padding:0.25rem 0.625rem">{{account.role}}</span>
          </td>
          <td style="text-align:right">
            <a routerLink="edit/{{account.id}}" class="btn-premium btn-ghost" style="font-size:0.8125rem;padding:0.375rem 0.75rem">Edit</a>
            <button (click)="deleteAccount(account)" class="btn-premium btn-danger-premium" style="font-size:0.8125rem;padding:0.375rem 0.75rem" [disabled]="account.isDeleting">
              <span *ngIf="account.isDeleting" class="spinner" style="width:0.75rem;height:0.75rem"></span>
              <span *ngIf="!account.isDeleting">Delete</span>
            </button>
          </td>
        </tr>
        <tr *ngIf="!accounts">
          <td colspan="4" style="text-align:center;padding:2rem">
            <div class="spinner spinner-lg" style="margin:0 auto"></div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
