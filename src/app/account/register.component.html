<div class="glass-card">
  <div class="glass-card-header">
    <h2>Create account</h2>
    <p>Get started with a free account</p>
  </div>
  <div class="glass-card-body">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Title</label>
        <select formControlName="title" class="form-select-custom" [class.is-invalid]="submitted && f['title'].errors">
          <option value="">Select title</option>
          <option value="Mr">Mr</option>
          <option value="Mrs">Mrs</option>
          <option value="Miss">Miss</option>
          <option value="Ms">Ms</option>
        </select>
        <div *ngIf="submitted && f['title'].errors" class="invalid-feedback" style="display:block">
          <div *ngIf="f['title'].errors['required']">Title is required</div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>First name</label>
          <input type="text" formControlName="firstName" class="form-input" [class.is-invalid]="submitted && f['firstName'].errors" placeholder="John" />
          <div *ngIf="submitted && f['firstName'].errors" class="invalid-feedback" style="display:block">
            <div *ngIf="f['firstName'].errors['required']">Required</div>
          </div>
        </div>
        <div class="form-group">
          <label>Last name</label>
          <input type="text" formControlName="lastName" class="form-input" [class.is-invalid]="submitted && f['lastName'].errors" placeholder="Doe" />
          <div *ngIf="submitted && f['lastName'].errors" class="invalid-feedback" style="display:block">
            <div *ngIf="f['lastName'].errors['required']">Required</div>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>Email address</label>
        <input type="email" formControlName="email" class="form-input" [class.is-invalid]="submitted && f['email'].errors" placeholder="you@example.com" />
        <div *ngIf="submitted && f['email'].errors" class="invalid-feedback" style="display:block">
          <div *ngIf="f['email'].errors['required']">Email is required</div>
          <div *ngIf="f['email'].errors['email']">Enter a valid email</div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" formControlName="password" class="form-input" [class.is-invalid]="submitted && f['password'].errors" placeholder="Min 6 characters" />
          <div *ngIf="submitted && f['password'].errors" class="invalid-feedback" style="display:block">
            <div *ngIf="f['password'].errors['required']">Required</div>
            <div *ngIf="f['password'].errors['minlength']">Min 6 characters</div>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm password</label>
          <input type="password" formControlName="confirmPassword" class="form-input" [class.is-invalid]="submitted && f['confirmPassword'].errors" placeholder="••••••••" />
          <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback" style="display:block">
            <div *ngIf="f['confirmPassword'].errors['required']">Required</div>
            <div *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords must match</div>
          </div>
        </div>
      </div>
      <div class="form-check-custom">
        <input type="checkbox" formControlName="acceptTerms" id="acceptTerms" [class.is-invalid]="submitted && f['acceptTerms'].errors" />
        <label for="acceptTerms">I accept the Terms & Conditions</label>
      </div>
      <div *ngIf="submitted && f['acceptTerms'].errors" class="invalid-feedback" style="display:block;margin-top:-0.75rem;margin-bottom:1rem">
        You must accept the terms
      </div>
      <button [disabled]="loading" class="btn-premium btn-primary-premium btn-full">
        <span *ngIf="loading" class="spinner"></span>
        {{ loading ? 'Creating account...' : 'Create account' }}
      </button>
      <div class="auth-links">
        <a routerLink="/account/login">Already have an account? Sign in</a>
      </div>
    </form>
  </div>
</div>
