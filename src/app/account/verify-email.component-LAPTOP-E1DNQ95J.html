<div style="padding:3rem 0;text-align:center">
  <div *ngIf="emailStatus === EmailStatus.Verifying">
    <div class="spinner spinner-lg" style="margin:0 auto 1.5rem"></div>
    <p style="color:var(--text-secondary)">Verifying your email...</p>
  </div>
  <div *ngIf="emailStatus === EmailStatus.Failed" class="glass-card" style="max-width:400px;margin:0 auto">
    <div class="glass-card-body" style="text-align:center;padding:2.5rem">
      <div style="font-size:2.5rem;margin-bottom:1rem">❌</div>
      <h2 style="font-size:1.25rem;font-weight:600;margin-bottom:0.5rem;color:var(--text-primary)">Verification Failed</h2>
      <p style="color:var(--text-muted);margin-bottom:1.5rem;font-size:0.875rem">Try using the forgot password page to verify.</p>
      <a routerLink="/account/forgot-password" class="btn-premium btn-primary-premium">Forgot password</a>
    </div>
  </div>
</div>
