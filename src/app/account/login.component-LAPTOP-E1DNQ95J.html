<div class="glass-card">
  <div class="glass-card-header">
    <h2>Welcome back</h2>
    <p>Sign in to your account</p>
  </div>
  <div class="glass-card-body">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email address</label>
        <input type="email" formControlName="email" class="form-input" [class.is-invalid]="submitted && f['email'].errors" placeholder="you@example.com" />
        <div *ngIf="submitted && f['email'].errors" class="invalid-feedback" style="display:block">
          <div *ngIf="f['email'].errors['required']">Email is required</div>
          <div *ngIf="f['email'].errors['email']">Enter a valid email address</div>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" class="form-input" [class.is-invalid]="submitted && f['password'].errors" placeholder="••••••••" />
        <div *ngIf="submitted && f['password'].errors" class="invalid-feedback" style="display:block">
          <div *ngIf="f['password'].errors['required']">Password is required</div>
        </div>
      </div>
      <button [disabled]="loading" class="btn-premium btn-primary-premium btn-full">
        <span *ngIf="loading" class="spinner"></span>
        {{ loading ? 'Signing in...' : 'Sign in' }}
      </button>
      <div class="auth-links">
        <a routerLink="/account/register">Create account</a>
        <a routerLink="/account/forgot-password">Forgot password?</a>
      </div>
    </form>
  </div>
</div>
