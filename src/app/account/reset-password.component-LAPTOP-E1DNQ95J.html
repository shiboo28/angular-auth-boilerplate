<div *ngIf="tokenStatus === TokenStatus.Validating" class="text-center" style="padding:3rem 0">
  <div class="spinner spinner-lg" style="margin:0 auto"></div>
</div>
<div *ngIf="tokenStatus === TokenStatus.Invalid" class="glass-card">
  <div class="glass-card-body" style="text-align:center;padding:2.5rem">
    <div style="font-size:2.5rem;margin-bottom:1rem">⚠️</div>
    <h2 style="font-size:1.25rem;font-weight:600;margin-bottom:0.5rem;color:var(--text-primary)">Invalid Token</h2>
    <p style="color:var(--text-muted);margin-bottom:1.5rem;font-size:0.875rem">The reset link is invalid or has expired.</p>
    <a routerLink="/account/forgot-password" class="btn-premium btn-primary-premium">Request new link</a>
  </div>
</div>
<div *ngIf="tokenStatus === TokenStatus.Valid" class="glass-card">
  <div class="glass-card-header">
    <h2>Reset password</h2>
    <p>Enter your new password below</p>
  </div>
  <div class="glass-card-body">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>New password</label>
        <input type="password" formControlName="password" class="form-input" [class.is-invalid]="submitted && f['password'].errors" placeholder="Min 6 characters" />
        <div *ngIf="submitted && f['password'].errors" class="invalid-feedback" style="display:block">
          <div *ngIf="f['password'].errors['required']">Password is required</div>
          <div *ngIf="f['password'].errors['minlength']">Min 6 characters</div>
        </div>
      </div>
      <div class="form-group">
        <label>Confirm password</label>
        <input type="password" formControlName="confirmPassword" class="form-input" [class.is-invalid]="submitted && f['confirmPassword'].errors" placeholder="••••••••" />
        <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback" style="display:block">
          <div *ngIf="f['confirmPassword'].errors['required']">Confirm password is required</div>
          <div *ngIf="f['confirmPassword'].errors['mustMatch']">Passwords must match</div>
        </div>
      </div>
      <button [disabled]="loading" class="btn-premium btn-primary-premium btn-full">
        <span *ngIf="loading" class="spinner"></span>
        {{ loading ? 'Resetting...' : 'Reset password' }}
      </button>
      <div class="auth-links">
        <a routerLink="/account/login">Back to sign in</a>
      </div>
    </form>
  </div>
</div>
